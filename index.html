<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0F12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Whispy — Tour guide radio. Scan QR to listen instantly." />
  <title>Whispy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ground: #0E0F12;
      --surface: #17181C;
      --surface-alt: #1F2126;
      --line: rgba(244, 243, 238, 0.08);
      --line-strong: rgba(244, 243, 238, 0.18);
      --fg: #F4F3EE;
      --fg-muted: #B5B7BD;
      --fg-faint: #7A7D85;
      --accent: #6DE58B;
      --accent-bg: rgba(109, 229, 139, 0.14);
      --warn: #FFB547;
      --warn-bg: rgba(255, 181, 71, 0.14);
      --danger: #FF5D5D;
      --danger-bg: rgba(255, 93, 93, 0.14);
      --sans: 'Geist', ui-sans-serif, -apple-system, system-ui, sans-serif;
      --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      min-height: 100vh;
      background: var(--ground);
      color: var(--fg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    input {
      font-family: inherit;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      width: 100%;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: var(--surface-alt);
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--fg);
      margin-top: -9px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--fg);
      font-size: 16px;
      outline: none;
      transition: border-color 150ms;
    }

    input[type=text]:focus,
    input[type=password]:focus {
      border-color: var(--accent);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .45;
        transform: scale(.85)
      }
    }

    @keyframes ring {
      0% {
        transform: scale(.55);
        opacity: .7
      }

      100% {
        transform: scale(1.5);
        opacity: 0
      }
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .ani {
      animation: fadein .35s ease both;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: var(--sat);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 10px;
      min-height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(14, 15, 18, .88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .topbar-title {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .topbar-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .topbar-slot {
      width: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--fg);
      transition: background 120ms;
    }

    .icon-btn:active {
      background: var(--surface);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-pad {
      padding: 16px;
    }

    .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-muted);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      font-weight: 500;
      text-transform: uppercase;
    }

    .pill-live {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .pill-warn {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .pill-danger {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .pill-neutral {
      background: transparent;
      color: var(--fg-muted);
      border: 1px solid var(--line);
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .pill-live .pill-dot {
      animation: pulse 1.4s ease-in-out infinite;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 14px;
      font-weight: 500;
      transition: opacity 90ms, transform 70ms;
      white-space: nowrap;
    }

    .btn:active:not(:disabled) {
      opacity: .8;
      transform: scale(.97);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-lg {
      padding: 14px 20px;
      font-size: 16px;
      width: 100%;
    }

    .btn-md {
      padding: 10px 16px;
      font-size: 14px;
    }

    .btn-sm {
      padding: 7px 12px;
      font-size: 13px;
    }

    .btn-primary {
      background: var(--fg);
      color: var(--ground);
    }

    .btn-accent {
      background: var(--accent);
      color: #06120A;
    }

    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--line-strong);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-soft {
      background: var(--surface-alt);
      color: var(--fg);
    }

    .segment {
      display: flex;
      padding: 3px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .seg-opt {
      flex: 1;
      padding: 8px 4px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      transition: all 120ms;
      color: var(--fg);
      background: transparent;
    }

    .seg-opt.active {
      background: var(--fg);
      color: var(--ground);
    }

    .switch {
      position: relative;
      width: 44px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: var(--surface-alt);
      transition: all 160ms;
      flex-shrink: 0;
    }

    .switch.on {
      background: var(--accent);
      border-color: var(--accent);
    }

    .switch-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--fg);
      transition: left 160ms, background 160ms;
    }

    .switch.on .switch-thumb {
      left: 20px;
      background: #06120A;
    }

    .vu-wrap {
      display: flex;
      gap: 2px;
      align-items: center;
      width: 100%;
    }

    .vu-seg {
      border-radius: 1px;
      transition: background 55ms linear;
    }

    .wave-wrap {
      display: flex;
      align-items: center;
      gap: 2px;
      width: 100%;
    }

    .wave-bar {
      width: 2px;
      border-radius: 1px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      font-size: 15px;
      width: 100%;
    }

    .row:last-child {
      border-bottom: none;
    }

    .bottom-bar {
      padding: 12px 20px;
      padding-bottom: calc(12px + var(--sab));
      border-top: 1px solid var(--line);
      background: var(--surface);
      position: sticky;
      bottom: 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .info-cell {
      padding: 10px 12px;
      background: var(--ground);
      border-radius: 10px;
    }

    .info-label {
      color: var(--fg-faint);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .info-value {
      color: var(--fg);
      font-family: var(--mono);
      font-size: 12px;
      margin-top: 2px;
      word-break: break-all;
    }

    .stat-cell {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--fg-muted);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -.02em;
      margin-top: 4px;
    }

    .stat-unit {
      color: var(--fg-muted);
      font-size: 13px;
    }

    .gap-8 {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .gap-12 {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gap-16 {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .gap-20 {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .row-flex {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .mono {
      font-family: var(--mono);
    }

    .muted {
      color: var(--fg-muted);
    }

    .faint {
      color: var(--fg-faint);
    }

    .accent {
      color: var(--accent);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--line-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }

    .hero {
      width: 100%;
      height: 200px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── URL params ───────────────────────────────────────────────────
    const _params = new URLSearchParams(window.location.search);
    const JOIN_PEER_ID = _params.get('join');   // guide's PeerJS ID encoded in QR
    const IS_TOURIST = !!JOIN_PEER_ID;
    const BROWSER_LANG = (navigator.language || 'en').startsWith('it') ? 'it' : 'en';

    // ICE servers: Google STUN (free) + Cloudflare STUN (free)
    // On the same local Wi-Fi (guide's hotspot), WebRTC uses local ICE candidates — TURN not needed.
    // For cross-internet connections add a free TURN from metered.ca if needed.
    const ICE_SERVERS = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun.cloudflare.com:3478' },
    ];

    // PeerJS server config. Default: PeerJS cloud (fine for prototyping / small tours).
    // For self-hosting set window.WHISPY_PEER_HOST = 'https://whispy-slg2.onrender.com'
    // before loading this script.
    function peerCfg() {
      const h = window.WHISPY_PEER_HOST;
      if (h) {
        const u = new URL(h);
        return { host: u.hostname, port: u.port || 443, path: '/', secure: u.protocol === 'https:', config: { iceServers: ICE_SERVERS } };
      }
      return { config: { iceServers: ICE_SERVERS } }; // PeerJS cloud default
    }

    // ─── i18n ─────────────────────────────────────────────────────────
    const STR = {
      en: {
        landing_title: 'The radio for\nmodern tours.',
        landing_sub: 'Broadcast to your group over local Wi-Fi.\nNo internet required. No dropouts.',
        be_guide: "I'm a guide", be_tourist: "I'm a tourist",
        ct_title: 'New tour', ct_name: 'Tour name', ct_name_ph: 'Vatican Museums — Afternoon',

        bc_mute: 'Mute', bc_unmute: 'Un-mute',
        bc_record: 'Record', bc_rec_on: 'Recording',
        bc_listeners: 'Listeners', bc_latency: 'Latency',
        bc_bitrate: 'Bitrate', bc_packet: 'Packet loss', bc_end: 'End tour',
        ls_title: 'Listeners',
        au_title: 'Audio', au_input: 'Input', au_codec: 'Codec',

        au_buffer: 'Jitter buffer', au_buffer_sub: 'Higher = more stable, more delay.',
        rec_title: 'Recordings',
        his_title: 'Tours', his_new: 'New tour',

        ts_scan: 'Scan QR', ts_manual: 'Enter code manually',
        ts_setup: 'Before you start', ts_headset: 'Use headphones for best quality.',
        ts_lang: 'Listening language', ts_vol: 'Volume', ts_ready: "I'm ready — start listening",
        ts_joining: 'Joining tour…', ts_step1: 'Connecting to network',
        ts_step2: 'Negotiating audio stream', ts_step3: 'Buffering',
        ts_guide: 'Your guide', ts_leave: 'Leave tour',
        ts_lost: 'Connection lost', ts_lost_sub: "Move closer to your guide. We'll reconnect automatically.",
        ts_retry: 'Retry', ts_tap: 'Tap to start audio',
        ts_about: 'About this tour', ts_guide_n: 'Guide', ts_started: 'Started',
        ts_lang_lbl: 'Broadcasting in', ts_stops: 'Stops',
        strong: 'STRONG', weak: 'WEAK', no_signal: 'NO SIGNAL',
        mic_denied: 'Microphone access denied. Please allow microphone in browser settings.',
        not_found: 'Tour not found. Make sure the guide is broadcasting and try again.',
        peer_error: 'Connection error. Check your internet and retry.',
        copy: 'Copy link', copied: 'Copied!',
      },
      it: {
        landing_title: 'La radio per\nle guide moderne.',
        landing_sub: 'Trasmetti al tuo gruppo via Wi-Fi locale.\nSenza internet. Senza interruzioni.',
        be_guide: 'Sono una guida', be_tourist: 'Sono un turista',
        ct_title: 'Nuovo tour', ct_name: 'Nome del tour', ct_name_ph: 'Musei Vaticani — Pomeriggio',

        bc_mute: 'Muto', bc_unmute: 'Attiva',
        bc_record: 'Registra', bc_rec_on: 'In registrazione',
        bc_listeners: 'Ascoltatori', bc_latency: 'Latenza',
        bc_bitrate: 'Bitrate', bc_packet: 'Pacchetti persi', bc_end: 'Termina',
        ls_title: 'Ascoltatori',
        au_title: 'Audio', au_input: 'Ingresso', au_codec: 'Codec',
        au_bitrate: 'Bitrate', au_noise: 'Soppressione rumore', au_agc: 'Auto-gain',
        au_buffer: 'Buffer jitter', au_buffer_sub: 'Più alto = più stabile, più ritardo.',
        rec_title: 'Registrazioni',
        his_title: 'Tour', his_new: 'Nuovo tour',
        ts_title: 'Unisciti al tour', ts_sub: 'Punta la fotocamera sul QR della guida per unirti immediatamente.',
        ts_scan: 'Scansiona QR', ts_manual: 'Inserisci codice',
        ts_setup: 'Prima di iniziare', ts_headset: 'Usa le cuffie per la migliore qualità.',
        ts_lang: 'Lingua di ascolto', ts_vol: 'Volume', ts_ready: 'Sono pronto — inizia ad ascoltare',
        ts_joining: 'Unione al tour…', ts_step1: 'Connessione alla rete',
        ts_step2: 'Negoziazione stream audio', ts_step3: 'Buffering',
        ts_guide: 'La tua guida', ts_leave: 'Esci dal tour',
        ts_lost: 'Connessione persa', ts_lost_sub: 'Avvicinati alla guida. Riconnetteremo automaticamente.',
        ts_retry: 'Riprova', ts_tap: 'Tocca per avviare l\'audio',
        ts_about: 'Su questo tour', ts_guide_n: 'Guida', ts_started: 'Avviato',
        ts_lang_lbl: 'Trasmissione in', ts_stops: 'Tappe',
        strong: 'FORTE', weak: 'DEBOLE', no_signal: 'NESSUN SEGNALE',
        mic_denied: 'Accesso microfono negato. Consenti il microfono nelle impostazioni del browser.',
        not_found: 'Tour non trovato. Assicurati che la guida stia trasmettendo e riprova.',
        peer_error: 'Errore di connessione. Controlla la rete e riprova.',
        copy: 'Copia link', copied: 'Copiato!',
      },
    };

    // ─── WebRTC: Guide peer ────────────────────────────────────────────
    // Guide creates a PeerJS peer. Tourists call the guide's peer ID.
    // Guide answers each incoming call with the microphone MediaStream.
    // Audio flows P2P — on the same local Wi-Fi (guide's hotspot) it
    // uses local ICE candidates directly, no relay cost.

    function useGuidePeer() {
      const peerRef = useRef(null);
      const streamRef = useRef(null);   // live microphone MediaStream
      const callsRef = useRef(new Map()); // peerId → MediaConnection
      const analyserRef = useRef(null);
      const rafRef = useRef(null);
      const recorderRef = useRef(null);
      const chunksRef = useRef([]);

      const [peerId, setPeerId] = useState(null);
      const [status, setStatus] = useState('idle'); // idle|requesting|connecting|live|error
      const [listeners, setListeners] = useState(0);
      const [level, setLevel] = useState(0);     // 0..1 audio level for VU meter
      const [error, setError] = useState(null);
      const [recording, setRecording] = useState(false);

      const refreshCount = () => setListeners(callsRef.current.size);

      const start = useCallback(async () => {
        setStatus('requesting');
        setError(null);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 48000 },
            video: false,
          });
          streamRef.current = stream;

          // Web Audio analyser for the VU meter
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 256;
          analyser.smoothingTimeConstant = 0.6;
          ctx.createMediaStreamSource(stream).connect(analyser);
          analyserRef.current = analyser;
          const buf = new Uint8Array(analyser.frequencyBinCount);
          const tick = () => {
            analyser.getByteFrequencyData(buf);
            setLevel(buf.reduce((a, b) => a + b, 0) / buf.length / 255);
            rafRef.current = requestAnimationFrame(tick);
          };
          rafRef.current = requestAnimationFrame(tick);

          setStatus('connecting');

          // Unique peer ID for this broadcast session
          const id = 'w-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
          const peer = new Peer(id, peerCfg());
          peerRef.current = peer;

          peer.on('open', () => { setPeerId(id); setStatus('live'); });

          // Each tourist calls in → answer with our mic stream
          peer.on('call', call => {
            call.answer(streamRef.current);
            callsRef.current.set(call.peer, call);
            refreshCount();
            call.on('close', () => { callsRef.current.delete(call.peer); refreshCount(); });
            call.on('error', () => { callsRef.current.delete(call.peer); refreshCount(); });
          });

          peer.on('error', err => { setError(err.type || String(err)); setStatus('error'); });
          peer.on('disconnected', () => { try { peer.reconnect(); } catch (_) { } });

        } catch (e) {
          setError(e.name === 'NotAllowedError' ? 'mic-denied' : e.message);
          setStatus('error');
        }
      }, []);

      const stop = useCallback(() => {
        cancelAnimationFrame(rafRef.current);
        peerRef.current?.destroy();
        streamRef.current?.getTracks().forEach(t => t.stop());
        callsRef.current.clear();
        setPeerId(null); setStatus('idle'); setListeners(0); setLevel(0);
      }, []);

      const setMuted = useCallback(muted => {
        streamRef.current?.getAudioTracks().forEach(t => { t.enabled = !muted; });
      }, []);

      // Local recording with MediaRecorder → download as WebM/Opus file
      const toggleRecording = useCallback(() => {
        if (!streamRef.current) return;
        if (recorderRef.current && recorderRef.current.state === 'recording') {
          recorderRef.current.stop();
          return;
        }
        chunksRef.current = [];
        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
        const rec = new MediaRecorder(streamRef.current, { mimeType: mime, audioBitsPerSecond: 64000 });
        recorderRef.current = rec;
        rec.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
        rec.onstop = () => {
          const blob = new Blob(chunksRef.current, { type: mime });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `whispy-${Date.now()}.webm`;
          a.click();
          URL.revokeObjectURL(url);
          setRecording(false);
        };
        rec.start(500); // collect chunks every 500 ms
        setRecording(true);
      }, []);

      return { peerId, status, listeners, level, error, recording, start, stop, setMuted, toggleRecording };
    }

    // ─── WebRTC: Tourist peer ─────────────────────────────────────────
    // Tourist creates a PeerJS peer, calls the guide's peer ID with a
    // silent stream (listen-only), and plays back the incoming audio.

    function useTouristPeer(guidePeerId) {
      const peerRef = useRef(null);
      const audioRef = useRef(null);  // <Audio> element for playback
      const actxRef = useRef(null);

      const [status, setStatus] = useState('idle'); // idle|connecting|live|lost|not-found
      const [needsTap, setNeedsTap] = useState(false);  // iOS autoplay gate

      const join = useCallback(async () => {
        if (!guidePeerId) { setStatus('not-found'); return; }
        setStatus('connecting');
        try {
          // Create a zero-gain silent stream so we can initiate a WebRTC call.
          // The guide answers with the mic stream → we hear them, they don't hear us.
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          actxRef.current = actx;
          const dest = actx.createMediaStreamDestination();
          const osc = actx.createOscillator();
          const g = actx.createGain();
          g.gain.value = 0;
          osc.connect(g); g.connect(dest); osc.start();

          const peer = new Peer(peerCfg());
          peerRef.current = peer;

          await new Promise((res, rej) => {
            const t = setTimeout(() => rej(new Error('signaling-timeout')), 12000);
            peer.on('open', () => { clearTimeout(t); res(); });
            peer.on('error', e => { clearTimeout(t); rej(e); });
          });

          const call = peer.call(guidePeerId, dest.stream);
          if (!call) throw new Error('no-stream');

          await new Promise((res, rej) => {
            const t = setTimeout(() => rej(new Error('stream-timeout')), 15000);
            call.on('stream', remoteStream => {
              clearTimeout(t);
              // Reuse or create the Audio element
              if (!audioRef.current) audioRef.current = new Audio();
              const audio = audioRef.current;
              audio.srcObject = remoteStream;
              // Try immediate play (needs prior user gesture — the "I'm ready" button)
              audio.play().then(() => {
                setStatus('live'); setNeedsTap(false); res();
              }).catch(() => {
                // Autoplay blocked (iOS): show tap-to-play prompt
                setStatus('live'); setNeedsTap(true); res();
              });
            });
            call.on('close', () => { clearTimeout(t); setStatus('lost'); });
            call.on('error', () => { clearTimeout(t); rej(new Error('call-error')); });
          });

        } catch (e) {
          peerRef.current?.destroy();
          const msg = e.message || '';
          setStatus(msg.includes('stream-timeout') || msg.includes('no-stream') ? 'not-found' : 'lost');
        }
      }, [guidePeerId]);

      const unlockAudio = useCallback(() => {
        audioRef.current?.play().then(() => setNeedsTap(false)).catch(() => { });
      }, []);

      const setVolume = useCallback(v => {
        if (audioRef.current) audioRef.current.volume = v / 100;
      }, []);

      const leave = useCallback(() => {
        peerRef.current?.destroy();
        if (audioRef.current) { audioRef.current.pause(); audioRef.current.srcObject = null; }
        actxRef.current?.close();
        setStatus('idle');
      }, []);

      return { status, needsTap, join, leave, setVolume, unlockAudio };
    }

    // Deterministic QR code visual (no external library)
    function QRCode({ size = 210, seed = 'whispy', color = '#0E0F12', bg = '#F4F3EE' }) {
      const grid = 25; const cell = size / grid;
      const hash = (i, j) => { const s = `${seed}-${i}-${j}`; let h = 0; for (let k = 0; k < s.length; k++) h = (h * 31 + s.charCodeAt(k)) | 0; return (h ^ (h >> 13)) & 1; };
      const isFinder = (i, j) => (i < 7 && j < 7) || (i < 7 && j >= grid - 7) || (i >= grid - 7 && j < 7);
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block', borderRadius: 4 }}>
          <rect width={size} height={size} fill={bg} />
          {Array.from({ length: grid }).map((_, i) => Array.from({ length: grid }).map((__, j) => {
            if (isFinder(i, j) || !hash(i, j)) return null;
            return <rect key={`${i}-${j}`} x={j * cell + 1} y={i * cell + 1} width={cell - 2} height={cell - 2} fill={color} rx={1} />;
          }))}
          {[[0, 0], [0, grid - 7], [grid - 7, 0]].map(([r, c], k) => (
            <g key={k}>
              <rect x={c * cell} y={r * cell} width={7 * cell} height={7 * cell} fill={color} rx={cell} />
              <rect x={c * cell + cell} y={r * cell + cell} width={5 * cell} height={5 * cell} fill={bg} rx={cell * .6} />
              <rect x={c * cell + 2 * cell} y={r * cell + 2 * cell} width={3 * cell} height={3 * cell} fill={color} rx={cell * .4} />
            </g>
          ))}
          <rect x={size / 2 - cell * 2.2} y={size / 2 - cell * 2.2} width={cell * 4.4} height={cell * 4.4} rx={cell * 1.1} fill={bg} />
          <g transform={`translate(${size / 2 - cell * 1.6} ${size / 2 - cell * 0.4})`}>
            {[0.2, 0.55, 1.0, 0.55, 0.2].map((h, i) => (
              <rect key={i} x={i * cell * .64} y={-h * cell} width={cell * .38} height={h * 2 * cell} rx={cell * .19} fill={color} />
            ))}
          </g>
        </svg>
      );
    }

    function WaveformBars({ count = 32, height = 28, seed = 7, color = '#6DE58B', live = false }) {
      const rng = i => { const x = Math.sin((i + seed) * 12.9898) * 43758.5453; return x - Math.floor(x); };
      const [t, setT] = useState(0);
      useEffect(() => {
        if (!live) return;
        let raf;
        const tick = () => { setT(v => v + 1); raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [live]);
      return (
        <div className="wave-wrap" style={{ height }}>
          {Array.from({ length: count }).map((_, i) => {
            let base = 0.25 + rng(i) * 0.75;
            if (live) base = 0.2 + 0.8 * Math.abs(Math.sin(t / 6 + i * 0.7 + rng(i) * 6));
            return <div key={i} className="wave-bar" style={{ height: `${base * 100}%`, background: color, opacity: 0.55 + base * .45 }} />;
          })}
        </div>
      );
    }

    function GuideQR({ t, tour, guide, onBack, onNext }) {

        return (
          <div className="screen center ani"><div className="spinner" /></div>

      }

      return (
        <div className="screen ani">
          <TopBar title={t.qr_title} left={<IconBtn name="chevL" onClick={onBack} />} />
          <div className="content" style={{ padding: '0 20px 40px' }}>

            <div className="card card-pad gap-16">
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <Logo size={14} />

                <div style={{ background: '#F4F3EE', borderRadius: 16, padding: 14, display: 'inline-block' }}>

              </div>

            <div style={{ marginTop: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, color: 'var(--fg-muted)', fontSize: 13 }}>

              {[1, 2, 3].map(i => (
                <div key={i} style={{ position: 'absolute', inset: 0, borderRadius: '50%', border: '1px solid var(--accent)', opacity: .3, animation: `ring 2s ${i * .4}s ease-out infinite` }} />

              {tourist.status === 'not-found' ? t.not_found : t.ts_lost_sub}
            </div>
            <button className="btn btn-primary btn-lg" style={{ marginTop: 32, maxWidth: 280 }} onClick={() => tourist.join()}>
              {t.ts_retry}
            </button>
          </div>
        );
      }

      return (
        <div className="screen ani">
          <TopBar
            left={<IconBtn name="info" onClick={() => setScreen('info')} />}
            title={_params.get('name') ? decodeURIComponent(_params.get('name')) : 'Tour'}
            subtitle={`${t.ts_guide.toUpperCase()}: MARIA R.`} />

          <div className="content" style={{ padding: '8px 20px 16px' }}>
            {/* Tap-to-play prompt for iOS autoplay restriction */}
            {tourist.needsTap && (
              <button className="btn btn-accent btn-lg" style={{ marginBottom: 16 }} onClick={tourist.unlockAudio}>
                <Icon name="volume" size={18} /> {t.ts_tap}
              </button>
            )}

            <div style={{ marginBottom: 20, padding: '10px 14px', borderRadius: 14, display: 'flex', alignItems: 'center', gap: 10, background: 'var(--accent-bg)', border: '1px solid var(--accent)' }}>
              <Pill kind="live">RECEIVING</Pill>
              <span style={{ flex: 1 }} />
              <span className="mono" style={{ fontSize: 10, letterSpacing: '.1em', color: 'var(--accent)', display: 'inline-flex', gap: 4, alignItems: 'center' }}>
                <Icon name="signal" size={12} /> {t.strong}
              </span>
            </div>

            {/* Live waveform (decorative — real incoming audio doesn't expose level to Web Audio easily) */}
            <div style={{ position: 'relative', height: 180, borderRadius: 20, background: 'var(--surface)', border: '1px solid var(--line)', padding: 20, overflow: 'hidden', marginBottom: 24 }}>
              <div className="mono" style={{ position: 'absolute', top: 14, left: 16, fontSize: 10, color: 'var(--fg-muted)', letterSpacing: '.14em' }}>INCOMING STREAM</div>
              <div className="mono" style={{ position: 'absolute', top: 14, right: 16, fontSize: 10, color: 'var(--fg-muted)', letterSpacing: '.14em' }}>OPUS · WebRTC</div>
              <div style={{ position: 'absolute', inset: '44px 20px', display: 'flex', alignItems: 'center' }}>
                <WaveformBars live count={48} height={92} seed={42} color="var(--accent)" />
              </div>
              <div className="mono" style={{ position: 'absolute', bottom: 14, left: 16, right: 16, display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--fg-faint)', letterSpacing: '.1em' }}>
                <span>P2P</span><span>LOCAL NETWORK</span><span>LOW LATENCY</span>
              </div>
            </div>

            <Field label={t.ts_vol} value={`${vol}%`}>
              <input type="range" min="0" max="100" value={vol}
                onChange={e => setVol(+e.target.value)} style={{ accentColor: 'var(--accent)' }} />
            </Field>
          </div>

          <div className="bottom-bar">
            <button className="btn btn-ghost btn-lg" onClick={() => { tourist.leave(); setScreen('tourist-landing'); }}>
              {t.ts_leave}
            </button>
          </div>
        </div>
      );
    }

    function TouristInfo({ t, setScreen }) {
      const tourName = _params.get('name') ? decodeURIComponent(_params.get('name')) : 'Tour';
      const stops = [
        { n: 1, name: 'Cortile della Pigna', dur: '12 min', done: true },
        { n: 2, name: 'Galleria dei Candelabri', dur: '18 min', done: true },
        { n: 3, name: 'Sistine Chapel', dur: '25 min', done: false, current: true },
        { n: 4, name: 'Stanze di Raffaello', dur: '20 min', done: false },
        { n: 5, name: "St. Peter's Basilica", dur: '30 min', done: false },
      ];
      return (
        <div className="screen ani">
          <TopBar title={t.ts_about} left={<IconBtn name="chevL" onClick={() => setScreen('listen')} />} />
          <div className="content" style={{ padding: '0 20px 40px' }}>
            <div className="card card-pad gap-12" style={{ marginBottom: 0 }}>
              <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: '-.02em' }}>{tourName}</div>
              <div className="grid-3">
                <InfoCell label={t.ts_guide_n} value="Maria R." />
                <InfoCell label={t.ts_started} value="32m" />
                <InfoCell label={t.ts_lang_lbl} value="IT" />
              </div>
            </div>
            <div className="label" style={{ padding: '18px 0 10px' }}>{t.ts_stops} · {stops.length}</div>
            <div className="card" style={{ overflow: 'hidden' }}>
              {stops.map((s, i) => (
                <div key={s.n} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 14, borderBottom: i === stops.length - 1 ? 'none' : '1px solid var(--line)', background: s.current ? 'var(--accent-bg)' : 'transparent' }}>
                  <div style={{ width: 28, height: 28, borderRadius: '50%', border: `1.5px solid ${s.done || s.current ? 'var(--accent)' : 'var(--line)'}`, background: s.done ? 'var(--accent)' : 'transparent', color: s.done ? '#06120A' : s.current ? 'var(--accent)' : 'var(--fg-muted)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--mono)', fontSize: 11, flexShrink: 0 }}>
                    {s.done ? <Icon name="check" size={14} sw={2.5} /> : s.n}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: s.current ? 600 : 500 }}>{s.name}</div>
                    <div className="mono" style={{ fontSize: 10, color: 'var(--fg-muted)' }}>
                      {s.dur.toUpperCase()}{s.current ? ' · NOW' : s.done ? ' · DONE' : ' · UPCOMING'}
                    </div>
                  </div>
                  {s.current && <Icon name="wave" size={16} color="var(--accent)" />}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────

    function App() {
      const [lang, setLang] = useState(BROWSER_LANG);
      const t = STR[lang] || STR.en;

      // Persistent tour configuration (guide)
      const [tour, setTour] = useState({
        name: 'Vatican Museums — Afternoon',
        lang: 'it', capacity: 30,
        accessOn: false,
        accessCode: String(Math.floor(1000 + Math.random() * 9000)),
        input: 'wired', noise: true, agc: true,
      });

      // Mute state lives in App so it persists when navigating between screens
      const [muted, setMuted] = useState(false);

      // Tourist state
      const [vol, setVol] = useState(80);
      const [listenLang, setListenLang] = useState(BROWSER_LANG);

      // Screen router
      const [screen, setScreen] = useState(IS_TOURIST ? 'tourist-setup' : 'landing');

      // WebRTC hooks (instantiated once, live for the session)
      const guide = useGuidePeer();
      const tourist = useTouristPeer(JOIN_PEER_ID);

      // Navigate tourist automatically when connection changes state
      useEffect(() => {
        if (screen === 'tourist-joining') {
          if (tourist.status === 'live') setScreen('listen');
          if (tourist.status === 'lost' || tourist.status === 'not-found') setScreen('listen');
        }
      }, [tourist.status, screen]);

      const goScreen = s => setScreen(s);

      switch (screen) {
        // ── Guide ──────────────────────────────────────────────────────
        case 'landing':
          return <GuideLanding t={t} lang={lang} setLang={setLang}
            onGuide={() => goScreen('create')} onTourist={() => goScreen('tourist-landing')} />;
        case 'create':
          return <GuideCreate t={t} tour={tour} setTour={setTour} guide={guide}
            onBack={() => { guide.stop(); goScreen('landing'); }} onNext={() => goScreen('qr')} />;
        case 'qr':
          return <GuideQR t={t} tour={tour} guide={guide}
            onBack={() => goScreen('create')} onNext={() => goScreen('broadcast')} />;
        case 'broadcast':
          return <GuideBroadcast t={t} tour={tour} guide={guide} muted={muted} setMuted={setMuted} setScreen={goScreen} />;
        case 'listeners':
          return <GuideListeners t={t} guide={guide} tour={tour} setScreen={goScreen} />;
        case 'audio':
          return <GuideAudio t={t} tour={tour} setTour={setTour} setScreen={goScreen} />;
        case 'history':
          return <GuideHistory t={t} setScreen={goScreen} />;

        // ── Tourist ────────────────────────────────────────────────────
        case 'tourist-landing':
          return <TouristLanding t={t} onScan={() => goScreen('tourist-setup')} />;
        case 'tourist-setup':
          return <TouristSetup t={t} vol={vol} setVol={setVol}
            listenLang={listenLang} setListenLang={setListenLang}
            onBack={IS_TOURIST ? null : () => goScreen('landing')}
            onReady={() => { tourist.join(); goScreen('tourist-joining'); }} />;
        case 'tourist-joining':
          return <TouristJoining t={t} tourist={tourist} peerId={JOIN_PEER_ID} />;
        case 'listen':
          return <TouristListen t={t} tourist={tourist} vol={vol} setVol={setVol} setScreen={goScreen} />;
        case 'info':
          return <TouristInfo t={t} setScreen={goScreen} />;

        default:
          return <GuideLanding t={t} lang={lang} setLang={setLang}
            onGuide={() => goScreen('create')} onTourist={() => goScreen('tourist-landing')} />;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
